databases:
  - name: merchandise-db
    plan: free
    databaseName: merchandise_production
    user: merchandise

services:
  - type: web
    name: merchandise-backend
    plan: free
    env: ruby
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: SOLID_QUEUE_IN_PUMA
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: merchandise-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"




